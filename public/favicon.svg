<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="24"/>
  <!-- Winged "H" (Hermes messenger) -->
  <!-- Left wing -->
  <path d="M40 55 C20 40 10 50 36 64" stroke="#000" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M32 48 C18 28 8 36 30 56" stroke="#000" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Right wing -->
  <path d="M88 55 C108 40 118 50 92 64" stroke="#000" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M96 48 C110 28 120 36 98 56" stroke="#000" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- "H" letter -->
  <line x1="50" y1="40" x2="50" y2="88" stroke="#000" stroke-width="7" stroke-linecap="round"/>
  <line x1="78" y1="40" x2="78" y2="88" stroke="#000" stroke-width="7" stroke-linecap="round"/>
  <line x1="50" y1="64" x2="78" y2="64" stroke="#000" stroke-width="7" stroke-linecap="round"/>
  <style>
    rect { fill: none; stroke: #000; stroke-width: 4; }
    @media (prefers-color-scheme: dark) {
      rect { stroke: #FFF; }
      path, line { stroke: #FFF; }
    }
  </style>
</svg>
